version: "2"

linters:
  default: none
  enable:
  - dupword
  - godot
  - govet
  - ineffassign
  - misspell
  - unused

  settings:
    govet:
      enable-all: true
      disable:
      - fieldalignment
      - shadow
    misspell:
      locale: US

formatters:
  enable:
  - gofmt
  - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
