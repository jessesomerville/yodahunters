name: Go
on:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - '**.go'
      - '**.mod'

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test -v ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true

    - name: go fmt
      run: go fmt ./... && git diff --exit-code
    - name: go vet
      run: go vet ./... && git diff --exit-code
    - name: go fix
      run: go fix ./... && git diff --exit-code
    - name: go mod tidy
      run: go mod tidy && git diff --exit-code